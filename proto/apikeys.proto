syntax = "proto3";

option go_package = "github.com/kapetan-io/querator/proto";
import "google/protobuf/timestamp.proto";

package querator;

message APIKeyMetadata {
  string id = 1;
  string user_id = 2 [json_name = "user_id"];
  string namespace_scope = 3 [json_name = "namespace_scope"];
  string name = 4;
  string prefix = 5;
  google.protobuf.Timestamp expires_at = 6 [json_name = "expires_at"];
  google.protobuf.Timestamp last_used_at = 7 [json_name = "last_used_at"];
  google.protobuf.Timestamp created_at = 8 [json_name = "created_at"];
}

message APIKeyCreateRequest {
  string user_id = 1 [json_name = "user_id"];
  string name = 2;
  string namespace_scope = 3 [json_name = "namespace_scope"];
  google.protobuf.Timestamp expires_at = 4 [json_name = "expires_at"];
  string key_tag = 5 [json_name = "key_tag"];
}

message APIKeyCreateResponse {
  string id = 1;
  string key = 2;
  string prefix = 3;
}

message APIKeysListRequest {
  string user_id = 1 [json_name = "user_id"];
  int32 limit = 2;
  string pivot = 3;
}

message APIKeysListResponse {
  repeated APIKeyMetadata items = 1;
}

message APIKeysDeleteRequest {
  string id = 1;
}
