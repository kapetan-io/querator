syntax = "proto3";

option go_package = "github.com/kapetan-io/querator/proto";
import "google/protobuf/timestamp.proto";

package querator;

message NamespaceInfo {
  // The name of the namespace (e.g., "production", "team-alpha")
  string name = 1;
  // Human-readable description of the namespace
  string description = 2;
  // The date the namespace was created
  google.protobuf.Timestamp createdAt = 3 [json_name = "created_at"];
  // The tag to embed in API keys created within this namespace
  string api_key_tag = 4 [json_name = "api_key_tag"];
}

message NamespacesListRequest {
  // Pivot is the name of the namespace to pivot upon when paging through lists of namespaces
  string pivot = 1;
  // Limit is the maximum number of items to return in a single list response
  int32 limit = 2;
}

message NamespacesListResponse {
  repeated NamespaceInfo items = 1;
}

message NamespacesDeleteRequest {
  // Name is the name of the namespace to delete
  string name = 1;
}
