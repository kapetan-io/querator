syntax = "proto3";

option go_package = "github.com/kapetan-io/querator/proto";
import "google/protobuf/timestamp.proto";

package querator;

message Role {
  string id = 1;
  string namespace = 2;
  string name = 3;
  repeated string permissions = 4;
  google.protobuf.Timestamp created_at = 5 [json_name = "created_at"];
}

message RoleCreateRequest {
  string namespace = 1;
  string name = 2;
  repeated string permissions = 3;
}

message RoleCreateResponse {
  string id = 1;
}

message RoleUpdateRequest {
  string namespace = 1;
  string name = 2;
  repeated string permissions = 3;
}

message RolesListRequest {
  string namespace = 1;
  int32 limit = 2;
  string pivot = 3;
}

message RolesListResponse {
  repeated Role items = 1;
}

message RolesDeleteRequest {
  string namespace = 1;
  string name = 2;
}

message RoleBinding {
  string id = 1;
  string namespace = 2;
  string user_id = 3 [json_name = "user_id"];
  string role_id = 4 [json_name = "role_id"];
  google.protobuf.Timestamp created_at = 5 [json_name = "created_at"];
}

message RoleBindingCreateRequest {
  string namespace = 1;
  string role_name = 2 [json_name = "role_name"];
  string user_id = 3 [json_name = "user_id"];
}

message RoleBindingCreateResponse {
  string id = 1;
}

message RoleBindingsListRequest {
  string namespace = 1;
  string user_id_filter = 2 [json_name = "user_id_filter"];
  int32 limit = 3;
  string pivot = 4;
}

message RoleBindingsListResponse {
  repeated RoleBinding items = 1;
}

message RoleBindingDeleteRequest {
  string namespace = 1;
  string role_name = 2 [json_name = "role_name"];
  string user_id = 3 [json_name = "user_id"];
}
