syntax = "proto3";

option go_package = "github.com/kapetan-io/querator/proto";
import "google/protobuf/timestamp.proto";

package querator;

message User {
  string id = 1;
  string username = 2;
  string external_id = 3 [json_name = "external_id"];
  string email = 4;
  google.protobuf.Timestamp created_at = 5 [json_name = "created_at"];
  google.protobuf.Timestamp updated_at = 6 [json_name = "updated_at"];
}

message UserCreateRequest {
  string username = 1;
  string email = 2;
  string external_id = 3 [json_name = "external_id"];
}

message UserCreateResponse {
  string id = 1;
}

message UsersListRequest {
  int32 limit = 1;
  string pivot = 2;
}

message UsersListResponse {
  repeated User items = 1;
}

message UsersDeleteRequest {
  string id = 1;
}
